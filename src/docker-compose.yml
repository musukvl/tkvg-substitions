version: '3.7'

services:
  tkvgbot:
    build:
      context: .
      dockerfile: TkvgSubstitutionBot/Dockerfile

    container_name: tkvgbot
    restart: always
    env_file:
      - .env
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080
      BotConfiguration__BotToken: ${TKVG_BOT_TOKEN}
      BotConfiguration__ChatInfoDirectory: /chat-info
    volumes:
      - chat-info-data:/chat-info

volumes:
  chat-info-data:
    driver: local
